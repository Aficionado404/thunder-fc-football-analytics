<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Thunder FC</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pitch: #0a1628;
            --grass: #00c851;
            --grass-dark: #009c3b;
            --gold: #f5c518;
            --white: #f0f4ff;
            --muted: #8892a4;
            --surface: #111d30;
            --border: rgba(255,255,255,0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--pitch);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Left panel — pitch graphic */
        .left-panel {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #061020;
        }

        .pitch-lines {
            position: absolute;
            inset: 0;
            opacity: 0.08;
        }

        .pitch-lines svg {
            width: 100%;
            height: 100%;
        }

        .left-content {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeUp 0.9s ease both;
        }

        .ball-icon {
            font-size: 80px;
            display: block;
            margin-bottom: 20px;
            animation: bounce 2.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .brand-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 72px;
            letter-spacing: 4px;
            color: var(--white);
            line-height: 1;
        }

        .brand-name span {
            color: var(--grass);
        }

        .brand-sub {
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 10px;
        }

        /* Right panel — form */
        .right-panel {
            width: 440px;
            min-height: 100vh;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px 48px;
            position: relative;
            border-left: 1px solid var(--border);
        }

        .right-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--grass), var(--gold));
        }

        .form-header {
            margin-bottom: 40px;
            animation: fadeUp 0.5s ease both;
        }

        .form-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 40px;
            letter-spacing: 2px;
            color: var(--white);
        }

        .form-header p {
            color: var(--muted);
            font-size: 14px;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 22px;
            animation: fadeUp 0.5s ease both;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }

        .form-group label {
            display: block;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
        }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: var(--muted);
            font-size: 18px;
            line-height: 1;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-pw:hover { color: var(--white); }
        .toggle-pw svg { width: 18px; height: 18px; display: block; }

        .form-group input {
            width: 100%;
            padding: 14px 46px 14px 46px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--grass);
            background: rgba(0,200,81,0.05);
            box-shadow: 0 0 0 3px rgba(0,200,81,0.1);
        }

        .form-group input::placeholder { color: #3d4f6a; }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--grass);
            color: #061020;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s 0.3s ease both;
            margin-top: 8px;
        }

        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.3s;
        }

        .btn-login:hover {
            background: var(--grass-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,200,81,0.3);
        }

        .btn-login:active { transform: translateY(0); }

        .credentials-card {
            margin-top: 36px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            animation: fadeUp 0.5s 0.4s ease both;
        }

        .credentials-card h4 {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .cred-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
            padding: 7px 8px;
        }

        .cred-row:last-child { border-bottom: none; }

        .cred-row:hover { background: rgba(255,255,255,0.04); }

        .cred-role {
            font-size: 12px;
            font-weight: 600;
            color: var(--white);
        }

        .cred-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .badge-admin { background: rgba(245,197,24,0.15); color: var(--gold); }
        .badge-coach { background: rgba(0,200,81,0.15); color: var(--grass); }
        .badge-player { background: rgba(100,149,237,0.15); color: #6495ed; }

        .cred-info {
            font-size: 12px;
            color: var(--muted);
            font-family: monospace;
        }

        /* Alerts */
        .alerts {
            margin-bottom: 24px;
            animation: fadeUp 0.4s ease both;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 8px;
            border-left: 3px solid;
        }

        .alert-danger { background: rgba(244,67,54,0.1); color: #ff6b6b; border-color: #f44336; }
        .alert-success { background: rgba(0,200,81,0.1); color: #69f0ae; border-color: var(--grass); }
        .alert-info { background: rgba(100,149,237,0.1); color: #90caf9; border-color: #6495ed; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .left-panel { display: none; }
            .right-panel { width: 100%; padding: 40px 28px; }
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/custom.js') }}" defer></script>
</head>
<body>

    <div class="left-panel">
        <div class="pitch-lines">
            <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                <rect width="800" height="600" fill="none" stroke="white" stroke-width="4"/>
                <line x1="400" y1="0" x2="400" y2="600" stroke="white" stroke-width="2"/>
                <circle cx="400" cy="300" r="80" fill="none" stroke="white" stroke-width="2"/>
                <circle cx="400" cy="300" r="4" fill="white"/>
                <rect x="0" y="150" width="130" height="300" fill="none" stroke="white" stroke-width="2"/>
                <rect x="670" y="150" width="130" height="300" fill="none" stroke="white" stroke-width="2"/>
                <rect x="0" y="220" width="50" height="160" fill="none" stroke="white" stroke-width="2"/>
                <rect x="750" y="220" width="50" height="160" fill="none" stroke="white" stroke-width="2"/>
                <circle cx="130" cy="300" r="40" fill="none" stroke="white" stroke-width="1.5"/>
                <circle cx="670" cy="300" r="40" fill="none" stroke="white" stroke-width="1.5"/>
            </svg>
        </div>

        <div class="left-content">
            <span class="ball-icon">⚽</span>
            <div class="brand-name">Thunder <span>FC</span></div>
            <div class="brand-sub">Performance Analytics System</div>
        </div>
    </div>

    <div class="right-panel">
        <div class="form-header">
            <h2>Sign In</h2>
            <p>Access your performance dashboard</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="alerts">
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <span class="icon">👤</span>
                    <input type="text" name="username" id="username" placeholder="Enter your username" required autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <span class="icon">🔒</span>
                    <input type="password" name="password" id="password" placeholder="Enter your password" required>
                    <button type="button" class="toggle-pw" id="togglePw" onclick="togglePassword()" aria-label="Toggle password visibility" title="Show / hide password">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                    </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                Enter Dashboard
            </button>
        </form>

        <!-- credentials card removed: fillCreds() was dead code with no trigger -->
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const btn = document.getElementById('togglePw');
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            btn.innerHTML = isHidden
                ? `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>`
                : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`;
        }

        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Signing in...';
            btn.style.opacity = '0.8';
        });
    </script>
</body>
</html>
